services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # IMPORTANT: SonarQube embeds Elasticsearch which requires vm.max_map_count >= 262144.
  # Run on your Docker host before starting: sysctl -w vm.max_map_count=262144
  # To persist across reboots, add `vm.max_map_count=262144` to /etc/sysctl.conf
  sonarqube:
    image: sonarqube:10-community
    restart: unless-stopped
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devops_risk
      POSTGRES_USER: devops_risk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_risk"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://devops_risk:${POSTGRES_PASSWORD:-changeme}@postgres:5432/devops_risk
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://devops_risk:${POSTGRES_PASSWORD:-changeme}@postgres:5432/devops_risk
      SONAR_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      GIT_CLONE_DEPTH: ${GIT_CLONE_DEPTH:-50}
      SKIP_TRIVY: ${SKIP_TRIVY:-false}
      SKIP_GITLEAKS: ${SKIP_GITLEAKS:-false}
      SKIP_HADOLINT: ${SKIP_HADOLINT:-false}
      SKIP_CHECKOV: ${SKIP_CHECKOV:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MOCK_DOC_ANALYSIS_PATH: ${MOCK_DOC_ANALYSIS_PATH:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sonarqube:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  postgres_data:

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # IMPORTANT: SonarQube embeds Elasticsearch which requires vm.max_map_count >= 262144.
  # Run on your Docker host before starting: sysctl -w vm.max_map_count=262144
  # To persist across reboots, add `vm.max_map_count=262144` to /etc/sysctl.conf
  sonarqube:
    image: sonarqube:10-community
    restart: unless-stopped
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      SONAR_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    depends_on:
      redis:
        condition: service_healthy
      sonarqube:
        condition: service_healthy

volumes:
  redis_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
